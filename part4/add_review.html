<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Review</title>
  <link rel="icon" type="image/png" href="images/icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <img src="images/logo.png" alt="HBnB logo" class="logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html" id="login-link" class="login-button">Login</a>
    </nav>
  </header>

  <main>
    <section class="form-section">
      <h1 id="review-place-title">Add a Review</h1>

      <form id="review-form" class="form">
        <label for="review-text">Your Review:</label>
        <textarea id="review-text" name="review" required></textarea>

        <label for="rating">Rating:</label>
        <select id="rating" name="rating" required>
          <option value="">Select a rating</option>
          <option value="1">1 - Poor</option>
          <option value="2">2 - Fair</option>
          <option value="3">3 - Good</option>
          <option value="4">4 - Very Good</option>
          <option value="5">5 - Excellent</option>
        </select>

        <p id="review-message" class="error-message" style="display: none;"></p>

        <button type="submit" class="primary-button">Submit Review</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&#169; 2024 HBnB Evolution. All rights reserved.</p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
