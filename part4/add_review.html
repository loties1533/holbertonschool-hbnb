<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB — Add Review</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo-text">HBnB</a>
        <nav>
            <a href="index.html">Home</a>
        </nav>
    </header>

    <main>
        <div class="form-wrapper">
            <form id="review-form" novalidate>
                <h2>Add a Review</h2>

                <!-- Place name injected dynamically -->
                <p id="place-name-label" style="color:var(--text-muted); font-size:.9rem; text-align:center; margin-top:-.5rem;"></p>

                <div>
                    <label for="review">Your review</label>
                    <textarea id="review" name="review"
                              placeholder="Describe your stay…" required></textarea>
                </div>

                <div>
                    <label for="rating">Rating</label>
                    <select id="rating" name="rating" required>
                        <option value="">— Choose a rating —</option>
                        <option value="1">⭐ 1 — Poor</option>
                        <option value="2">⭐⭐ 2 — Fair</option>
                        <option value="3">⭐⭐⭐ 3 — Good</option>
                        <option value="4">⭐⭐⭐⭐ 4 — Very good</option>
                        <option value="5">⭐⭐⭐⭐⭐ 5 — Excellent</option>
                    </select>
                </div>

                <div id="review-error" class="error-msg" style="display:none;"></div>

                <button type="submit">Submit Review</button>

                <p style="text-align:center; font-size:.85rem; color:#888;">
                    <a id="back-to-place" href="index.html"
                       style="color:var(--primary);">← Back to place</a>
                </p>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 HBnB — All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
