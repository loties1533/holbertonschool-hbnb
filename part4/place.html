<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB — Place Details</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo-text">HBnB</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </nav>
    </header>

    <main>
        <!-- Place details — populated dynamically -->
        <section id="place-details" class="place-details">
        </section>

        <!-- Reviews list — populated dynamically -->
        <section id="reviews">
            <h2>Guest reviews</h2>
        </section>

        <!-- Add review (visible only when authenticated) -->
        <section id="add-review" style="display:none;">
            <h2>Leave a review</h2>
            <form id="review-form">
                <div>
                    <label for="review-text">Your experience</label>
                    <textarea id="review-text" name="review-text"
                              placeholder="Share what you loved about this place…"
                              required></textarea>
                </div>
                <div>
                    <label for="rating">Rating</label>
                    <select id="rating" name="rating" required>
                        <option value="">— Choose a rating —</option>
                        <option value="1">⭐ 1 — Poor</option>
                        <option value="2">⭐⭐ 2 — Fair</option>
                        <option value="3">⭐⭐⭐ 3 — Good</option>
                        <option value="4">⭐⭐⭐⭐ 4 — Very good</option>
                        <option value="5">⭐⭐⭐⭐⭐ 5 — Excellent</option>
                    </select>
                </div>
                <div id="review-error" class="error-msg" style="display:none;"></div>
                <button type="submit">Submit review</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBnB — All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
