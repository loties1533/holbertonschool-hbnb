<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBnB - Place Details</title>
  <link rel="icon" type="image/png" href="images/icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <img src="images/logo.png" alt="HBnB logo" class="logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html" id="login-link" class="login-button">Login</a>
    </nav>
  </header>

  <main>
    <section class="place-header">
      <h1 id="place-title">Place Details</h1>
    </section>

    <section id="place-details" class="place-details"></section>

    <section id="reviews" class="reviews-section"></section>

    <section id="add-review" class="form hidden">
      <h2>Add a review</h2>
      <p>If you are logged in, you can leave a review for this place.</p>
      <a id="add-review-link" class="primary-button" href="#">Add Review</a>
    </section>
  </main>

  <footer>
    <p>&#169; 2024 HBnB Evolution. All rights reserved.</p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
