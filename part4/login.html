<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB — Login</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo-text">HBnB</a>
        <nav>
            <a href="index.html">Home</a>
        </nav>
    </header>

    <main>
        <div class="form-wrapper">
            <form id="login-form" novalidate>
                <h2>Welcome back</h2>

                <div>
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email"
                           placeholder="you@example.com" required>
                </div>

                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password"
                           placeholder="••••••••" required>
                </div>

                <div id="login-error" class="error-msg" style="display:none;"></div>

                <button type="submit">Sign in</button>

                <p style="text-align:center; font-size:.85rem; color:#888;">
                    <a href="index.html" style="color:var(--primary);">← Back to listings</a>
                </p>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 HBnB — All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
