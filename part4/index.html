<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBnB - Places</title>
  <link rel="icon" type="image/png" href="images/icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <img src="images/logo.png" alt="HBnB logo" class="logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html" id="login-link" class="login-button">Login</a>
    </nav>
  </header>

  <main>
    <section class="intro">
      <h1>Discover places to stay</h1>
      <p>Browse all available locations and choose the best one for your next trip.</p>
    </section>

    <section class="filter-section form">
      <label for="price-filter">Filter by price</label>
      <select id="price-filter">
        <option value="">All</option>
        <option value="10">Up to $10</option>
        <option value="50">Up to $50</option>
        <option value="100">Up to $100</option>
      </select>
    </section>

    <section id="places-list" class="places-grid"></section>
  </main>

  <footer>
    <p>&#169; 2024 HBnB Evolution. All rights reserved.</p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
