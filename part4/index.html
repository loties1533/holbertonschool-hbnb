<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB — Find your place</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo-text">HBnB</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </nav>
    </header>

    <main>
        <section id="filter">
            <label for="price-filter">Max price per night :</label>
            <select id="price-filter">

                <option value="50">$50</option>
                <option value="100">$100</option>
                <option value="all" selected>All prices</option>
            </select>
        </section>

        <section id="places-list">
            <!-- Populated dynamically by scripts.js -->
        </section>
    </main>

    <footer>

    </footer>

    <script src="scripts.js"></script>

</html>
